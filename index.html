<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHANE'S DOMAIN | THE EXPERIENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Mono:wght@700&display=swap');
        body { background: #000; color: #fff; overflow-x: hidden; font-family: 'Space Mono', monospace; }
        .glitch { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; animation: glitch-anim 2s infinite linear alternate-reverse; }
        @keyframes glitch-anim { 0% { transform: skew(0deg); } 20% { transform: skew(-1deg); } 100% { transform: skew(1deg); } }
        canvas { background: #050505; border: 4px solid #333; cursor: crosshair; touch-action: none; }
        .fnaf-vignette { box-shadow: inset 0 0 150px #000; pointer-events: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center py-10">

    <header class="text-center mb-10">
        <h1 class="text-7xl font-black glitch mb-2 tracking-tighter">SHANE'S DOMAIN</h1>
        <p class="text-yellow-400 font-bold animate-bounce uppercase">Best Promotion Ever JDJJDJE</p>
    </header>

    <div class="flex gap-4 mb-6">
        <button onclick="startGame('poop')" class="bg-brown-600 bg-orange-900 px-6 py-2 rounded-full font-bold hover:bg-orange-700">FLYING POOP (FNAF)</button>
        <button onclick="startGame('parasite')" class="bg-green-600 px-6 py-2 rounded-full font-bold hover:bg-green-500">PARASITE DANCE</button>
    </div>

    <div class="relative">
        <div id="ui" class="absolute top-4 left-4 z-20 pointer-events-none">
            <div class="text-2xl font-bold text-red-600 uppercase" id="score">SCORE: 0</div>
            <div class="text-sm text-gray-400" id="controls">SPACE/TAP TO JUMP</div>
        </div>
        <div id="game-over" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-30">
            <h2 class="text-4xl text-red-600 font-bold mb-4">GAME OVER</h2>
            <button onclick="resetGame()" class="bg-white text-black px-8 py-2 font-black rounded-lg">RETRY</button>
        </div>
        <div class="fnaf-vignette absolute inset-0 z-10"></div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <footer class="mt-20 text-center opacity-50">
        <p>SHANE'S DOMAIN &copy; 2026</p>
        <p class="text-xs">Warning: Dancing parasites may cause hype.</p>
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        
        let currentGame = 'poop';
        let score = 0;
        let isGameOver = false;
        let frame = 0;

        // Game Objects
        let player = { x: 50, y: 200, w: 40, h: 40, vy: 0, gravity: 0.6, jump: -8 };
        let obstacles = [];

        function startGame(type) {
            currentGame = type;
            resetGame();
        }

        function resetGame() {
            score = 0;
            isGameOver = false;
            frame = 0;
            obstacles = [];
            player.y = 200;
            player.vy = 0;
            scoreEl.innerText = `SCORE: 0`;
            gameOverEl.classList.add('hidden');
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') player.vy = player.jump; });
        canvas.addEventListener('mousedown', () => { player.vy = player.jump; });

        function update() {
            if (isGameOver) return;
            frame++;

            // Physics
            player.vy += player.gravity;
            player.y += player.vy;

            if (player.y > canvas.height || player.y < 0) isGameOver = true;

            // Obstacles (FNAF Style Pipes/Walls)
            if (frame % 90 === 0) {
                let gap = 120;
                let topH = Math.random() * (canvas.height - gap - 40) + 20;
                obstacles.push({ x: canvas.width, y: 0, w: 50, h: topH, type: 'top' });
                obstacles.push({ x: canvas.width, y: topH + gap, w: 50, h: canvas.height, type: 'bottom' });
            }

            obstacles.forEach(o => {
                o.x -= 3;
                // Collision
                if (player.x < o.x + o.w && player.x + player.w > o.x && 
                    player.y < o.y + o.h && player.y + player.h > o.y) {
                    isGameOver = true;
                }
            });

            obstacles = obstacles.filter(o => o.x > -50);
            if (frame % 90 === 0 && frame > 0) {
                score++;
                scoreEl.innerText = `SCORE: ${score}`;
            }

            if (isGameOver) gameOverEl.classList.remove('hidden');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background Scanlines
            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 1);

            if (currentGame === 'poop') {
                // Draw Flying Poop with Freddy Hat
                ctx.fillStyle = "#63422e"; // Brown
                ctx.beginPath();
                ctx.arc(player.x + 20, player.y + 25, 15, 0, Math.PI * 2);
                ctx.fill();
                // Freddy Hat
                ctx.fillStyle = "black";
                ctx.fillRect(player.x + 10, player.y, 20, 5);
                ctx.fillRect(player.x + 15, player.y - 10, 10, 10);
            }

            // Draw Pipes (FNAF Guard Pillars)
            ctx.fillStyle = "#1a1a1a";
            ctx.strokeStyle = "#444";
            obstacles.forEach(o => {
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeRect(o.x, o.y, o.w, o.h);
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
