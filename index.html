<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHANE'S DOMAIN | FORSAKEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rubik+Glitch&display=swap');
        
        body { background: #000; overflow: hidden; font-family: 'Permanent Marker', cursive; }
        
        .forsaken-text {
            font-family: 'Rubik Glitch', display;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
        }

        .parasite {
            position: absolute;
            width: 4px;
            height: 40px;
            background: #32CD32;
            border-radius: 50%;
            filter: blur(1);
            animation: wiggle 0.5s infinite ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: scaleY(1) skewX(0deg); }
            50% { transform: scaleY(1.5) skewX(20deg); }
        }

        #basketball {
            position: absolute;
            font-size: 50px;
            user-select: none;
        }

        .meme-e {
            position: absolute;
            font-size: 80px;
            font-weight: 900;
            color: white;
            opacity: 0.1;
            pointer-events: none;
        }

        .neon-bolt {
            position: absolute;
            width: 2px;
            height: 15px;
            background: cyan;
            box-shadow: 0 0 10px cyan;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="z-50 text-center pointer-events-none">
        <h1 class="forsaken-text text-8xl mb-4">SHANE</h1>
        <div class="text-white text-3xl tracking-widest opacity-80">FORSAKEN PROMOTION</div>
        <div class="mt-8 text-6xl text-white">E</div>
    </div>

    <div id="basketball">🏀</div>

    <script>
        const body = document.body;

        // 1. DANCING PARASITES (Green Wigglers)
        for (let i = 0; i < 30; i++) {
            let p = document.createElement('div');
            p.className = 'parasite';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.animationDelay = Math.random() * 2 + 's';
            body.appendChild(p);
        }

        // 2. 500 NEON BOLTS (The Rain)
        for (let i = 0; i < 500; i++) {
            let bolt = document.createElement('div');
            bolt.className = 'neon-bolt';
            bolt.style.left = Math.random() * 100 + 'vw';
            bolt.style.top = Math.random() * 100 + 'vh';
            bolt.style.opacity = Math.random();
            body.appendChild(bolt);
        }

        // 3. THE "E" MEME BACKGROUND
        for (let i = 0; i < 15; i++) {
            let e = document.createElement('div');
            e.className = 'meme-e';
            e.innerText = 'E';
            e.style.left = Math.random() * 100 + 'vw';
            e.style.top = Math.random() * 100 + 'vh';
            body.appendChild(e);
        }

        // 4. BOUNCING BASKETBALL LOGIC
        const ball = document.getElementById('basketball');
        let posX = 100, posY = 100;
        let velX = 5, velY = 5;

        function animateBall() {
            posX += velX;
            posY += velY;

            if (posX + 50 > window.innerWidth || posX < 0) velX *= -1;
            if (posY + 50 > window.innerHeight || posY < 0) velY *= -1;

            ball.style.left = posX + 'px';
            ball.style.top = posY + 'px';
            requestAnimationFrame(animateBall);
        }
        animateBall();

    </script>
</body>
</html>
