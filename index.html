<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHANE'S DOMAIN | MAX CHAOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        body { background: #050505; color: white; overflow: hidden; font-family: 'Permanent Marker', cursive; }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .fart-cloud { position: absolute; border-radius: 50%; background: rgba(139, 69, 19, 0.5); filter: blur(10px); pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1 class="text-6xl text-green-500 tracking-widest drop-shadow-[0_0_15px_rgba(34,197,94,0.8)]">SHANE'S DOMAIN</h1>
        <p class="text-xl text-red-600 animate-pulse">TAP TO JUMP | AVOID THE WALLS</p>
        <div id="scoreBoard" class="text-4xl mt-4">SCORE: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = {
            x: 100,
            y: canvas.height / 2,
            vy: 0,
            width: 50,
            height: 50,
            gravity: 0.6,
            jumpPower: -10
        };

        let obstacles = [];
        let parasites = [];
        let particles = [];

        class Parasite {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 2;
            }
            draw() {
                ctx.strokeStyle = '#32CD32';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                for(let i=0; i<5; i++) {
                    ctx.lineTo(this.x + Math.sin(this.angle + i) * 15, this.y + i * 10);
                }
                ctx.stroke();
                this.y += Math.sin(this.angle) * 2;
                this.angle += 0.1;
            }
        }

        function createFart() {
            for(let i=0; i<5; i++) {
                particles.push({
                    x: player.x,
                    y: player.y + 25,
                    vx: -Math.random() * 5,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 20 + 10,
                    life: 1.0
                });
            }
        }

        function drawPlayer() {
            // The Poop
            ctx.fillStyle = '#63422e';
            ctx.beginPath();
            ctx.arc(player.x + 25, player.y + 25, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // FNAF Top Hat
            ctx.fillStyle = 'black';
            ctx.fillRect(player.x + 15, player.y - 5, 20, 5); // Brim
            ctx.fillRect(player.x + 18, player.y - 15, 14, 10); // Top
        }

        function update() {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            player.vy += player.gravity;
            player.y += player.vy;

            // Draw Particles (Farts)
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                ctx.fillStyle = `rgba(100, 80, 0, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });

            // Draw Parasites
            parasites.forEach(p => p.draw());

            drawPlayer();

            if(player.y > canvas.height || player.y < 0) {
                resetGame();
            }

            requestAnimationFrame(update);
        }

        function resetGame() {
            player.y = canvas.height / 2;
            player.vy = 0;
            score = 0;
            document.getElementById('scoreBoard').innerText = "SCORE: 0";
        }

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                player.vy = player.jumpPower;
                createFart();
                score++;
                document.getElementById('scoreBoard').innerText = `SCORE: ${score}`;
            }
        });

        // Init parasites
        for(let i=0; i<20; i++) parasites.push(new Parasite());

        update();
    </script>
</body>
</html>
