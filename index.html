<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shane's Domain | Promo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0a0a0a; overflow-x: hidden; font-family: sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-white">

    <canvas id="parasiteCanvas"></canvas>

    <div class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass max-w-lg w-full p-10 rounded-3xl text-center shadow-2xl">
            <h1 class="text-6xl font-black tracking-tighter mb-2 bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">
                SHANE
            </h1>
            <p class="text-gray-400 uppercase tracking-widest font-bold mb-8">The Domain of Innovation</p>
            
            <div class="space-y-4">
                <button class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-green-400 transition-colors">
                    VIEW PROJECTS
                </button>
                <button class="w-full py-4 border border-white/20 rounded-xl font-bold hover:bg-white/10 transition-all">
                    CONTACT SHANE
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('parasiteCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, parasites = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            parasites = [];
            for (let i = 0; i < 40; i++) {
                parasites.push(new Parasite());
            }
        }

        class Parasite {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.points = [];
                this.segments = 15;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 1 + Math.random() * 2;
                this.color = `hsla(${120 + Math.random() * 60}, 80%, 50%, 0.6)`;
                
                for(let i=0; i<this.segments; i++) {
                    this.points.push({x: this.x, y: this.y});
                }
            }

            update() {
                this.angle += (Math.random() - 0.5) * 0.5;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Screen Wrap
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                let head = this.points[0];
                head.x = this.x;
                head.y = this.y;

                for (let i = this.segments - 1; i > 0; i--) {
                    let p = this.points[i];
                    let nextP = this.points[i-1];
                    p.x += (nextP.x - p.x) * 0.4;
                    p.y += (nextP.y - p.y) * 0.4;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.segments; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.stroke();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
            ctx.fillRect(0, 0, width, height);
            parasites.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
